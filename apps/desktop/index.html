    <script>
      // Apply persisted dark-mode class before React mounts to avoid a flash
      // of the wrong theme on the AppLoader screen.
      // Zustand persist writes: { state: { isDark: bool }, version: 0 }
      (function () {
        try {
          var raw = localStorage.getItem("atlas-theme");
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.isDark) {
              document.documentElement.classList.add("dark");
            }
          }
        } catch (_) {}
      })();
    </script>
