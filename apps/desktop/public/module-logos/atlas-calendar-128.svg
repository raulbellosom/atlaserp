<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#7C3AED"/>

  <!-- Calendar body -->
  <rect x="22" y="36" width="84" height="72" rx="10" fill="white" fill-opacity="0.15"/>
  <rect x="22" y="36" width="84" height="72" rx="10" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="22" y="36" width="84" height="26" rx="10" fill="white" fill-opacity="0.25"/>
  <rect x="22" y="52" width="84" height="10" fill="white" fill-opacity="0.25"/>

  <!-- Ring hooks -->
  <rect x="44" y="22" width="8" height="22" rx="4" fill="white" fill-opacity="0.9"/>
  <rect x="76" y="22" width="8" height="22" rx="4" fill="white" fill-opacity="0.9"/>

  <!-- Calendar grid dots — row 1 -->
  <rect x="34" y="74" width="8" height="8" rx="2" fill="white" fill-opacity="0.7"/>
  <rect x="50" y="74" width="8" height="8" rx="2" fill="white" fill-opacity="0.7"/>
  <rect x="66" y="74" width="8" height="8" rx="2" fill="white" fill-opacity="0.7"/>
  <rect x="82" y="74" width="8" height="8" rx="2" fill="white" fill-opacity="0.7"/>

  <!-- Calendar grid dots — row 2 -->
  <rect x="34" y="90" width="8" height="8" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="50" y="90" width="8" height="8" rx="2" fill="white" fill-opacity="0.5"/>
  <!-- Highlighted today cell -->
  <rect x="66" y="88" width="12" height="12" rx="3" fill="white"/>
  <rect x="82" y="90" width="8" height="8" rx="2" fill="white" fill-opacity="0.5"/>
</svg>
