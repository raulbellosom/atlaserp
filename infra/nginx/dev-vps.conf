# Nginx reverse proxy config for VPS dev environment.
# Copy to: /etc/nginx/sites-available/dev-atlaserp.racoondevs.com
# Then: ln -s /etc/nginx/sites-available/dev-atlaserp.racoondevs.com /etc/nginx/sites-enabled/
# Run: nginx -t && systemctl reload nginx
#
# SSL certificates are managed by Certbot — run before activating this config:
#   certbot --nginx -d dev-atlaserp.racoondevs.com

server {
    listen 80;
    server_name dev-atlaserp.racoondevs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev-atlaserp.racoondevs.com;

    # Certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/dev-atlaserp.racoondevs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-atlaserp.racoondevs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          SAMEORIGIN;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # Max upload size (file assets)
    client_max_body_size 50M;

    # Atlas API — strip /api prefix before forwarding to Hono
    location /api/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Atlas Web Preview (Vite build served by internal Nginx)
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
