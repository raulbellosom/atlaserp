server {
    listen 80;
    server_name _;

    # AME3 module shims live at stable URLs. They must revalidate on every load
    # or browsers can keep an older shim after a deployment and break module
    # bundles with errors like "react/jsx-runtime does not provide an export".
    location /shims/ {
        alias /usr/share/nginx/html/shims/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # Redirect root and /app (no trailing slash) to /app/
    # Uses $http_host to preserve port (e.g. localhost:5173)
    location = / {
        return 302 $scheme://$http_host/app/;
    }

    location = /app {
        return 301 $scheme://$http_host/app/;
    }

    location = /app/ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # Public folder assets referenced with absolute paths (e.g. /brand/, /module-logos/)
    # Vite serves public/ at root in dev; in production nginx needs explicit rules.
    location /brand/ {
        alias /usr/share/nginx/html/brand/;
    }
    location /module-logos/ {
        alias /usr/share/nginx/html/module-logos/;
    }

    # ERP admin SPA (includes /app/shims/ for AME3 module external shims)
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ @app_fallback;
    }

    location @app_fallback {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # Catch-all for root-level static assets: favicon, PWA icons, site.webmanifest,
    # and any other files copied from public/ that are referenced at absolute paths.
    location / {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
}
