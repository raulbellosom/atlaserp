server {
    listen 80;
    server_name _;

    # Root redirects to the ERP admin app.
    # Uses $http_host (includes port, e.g. localhost:5173) instead of $host (port stripped).
    location = / {
        return 302 $scheme://$http_host/app/;
    }

    # ERP admin SPA
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri @app_fallback;
    }

    location @app_fallback {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
