server {
    listen 80;
    server_name _;

    # Root redirects to the ERP admin app.
    # The public website proxy (atlas.website module) is handled by a separate
    # nginx config on VPS deployments — not needed for the Docker installer.
    location = / {
        return 302 /app/;
    }

    # ERP admin SPA
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri @app_fallback;
    }

    location @app_fallback {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
