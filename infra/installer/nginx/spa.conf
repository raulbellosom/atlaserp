server {
    listen 80;
    server_name _;

    # AME3 module shims live at stable URLs. They must revalidate on every load
    # or browsers can keep an older shim after a deployment and break module
    # bundles with errors like "react/jsx-runtime does not provide an export".
    location /shims/ {
        alias /usr/share/nginx/html/shims/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # Redirect /app (no trailing slash) to /app/
    location = /app {
        return 301 $scheme://$http_host/app/;
    }

    location = /app/ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # Public folder assets referenced with absolute paths (e.g. /brand/, /module-logos/)
    # Vite serves public/ at root in dev; in production nginx needs explicit rules.
    location /brand/ {
        alias /usr/share/nginx/html/brand/;
    }
    location /module-logos/ {
        alias /usr/share/nginx/html/module-logos/;
    }

    # ERP admin SPA (includes /app/shims/ for AME3 module external shims)
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ @app_fallback;
    }

    location @app_fallback {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # Service worker — must be served directly, no redirects allowed by browser spec.
    location = /sw-notifications.js {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location = /pwa-bootstrap.js {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    location /pwa/ {
        resolver           127.0.0.11 valid=30s;
        set $upstream      http://api:4010;
        proxy_pass         $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Root-level static assets that must NOT be proxied to the API.
    # The catch-all location / proxies everything to the API for the public website,
    # so these files need explicit rules to be served from the Vite build output.
    location = /site.webmanifest {
        root /usr/share/nginx/html;
        add_header Content-Type "application/manifest+json" always;
    }
    location = /apple-touch-icon.png    { root /usr/share/nginx/html; }
    location = /favicon.ico             { root /usr/share/nginx/html; }
    location = /favicon-32x32.png       { root /usr/share/nginx/html; }
    location = /icon-192.png            { root /usr/share/nginx/html; }
    location = /icon-512.png            { root /usr/share/nginx/html; }
    location = /og-image.png            { root /usr/share/nginx/html; }
    location = /runtime-config.js {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Storefront API calls — proxy directly to the API without path rewriting.
    # The catch-all location / rewrites / → /public/site$request_uri, so storefront
    # SDK calls to /public/storefront/* must be intercepted before that block.
    location /public/storefront/ {
        resolver           127.0.0.11 valid=30s;
        set $upstream      http://api:4010;
        proxy_pass         $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Public website — proxy to API for dist mode (serves HTML from storage).
    # On 404 (builder mode, no dist, no site configured) fall back to React SPA.
    # PublicWebsiteEntry then handles: builder rendering, coming soon, none→login.
    location / {
        resolver           127.0.0.11 valid=30s;
        set $upstream      http://api:4010;
        proxy_pass         $upstream/public/site$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_intercept_errors on;
        error_page 404    = @spa_fallback;
    }

    location @spa_fallback {
        root    /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }
}
