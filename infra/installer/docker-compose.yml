name: atlaserp

services:
  atlas-api-external:
    image: ${ATLAS_API_IMAGE:-raulbellosom/atlaserp:api-latest}
    container_name: atlas-api-external
    profiles: ["external"]
    env_file:
      - ./.env.external
    environment:
      ATLAS_PROJECT_ROOT: /app
    ports:
      - "4010:4010"
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-worker-external:
    image: ${ATLAS_WORKER_IMAGE:-raulbellosom/atlaserp:worker-latest}
    container_name: atlas-worker-external
    profiles: ["external"]
    env_file:
      - ./.env.external
    environment:
      ATLAS_PROJECT_ROOT: /app
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-web-external:
    image: ${ATLAS_WEB_EXTERNAL_IMAGE:-raulbellosom/atlaserp:web-external-latest}
    container_name: atlas-web-external
    profiles: ["external"]
    ports:
      - "5173:80"
    restart: unless-stopped

  atlas-api-local:
    image: ${ATLAS_API_LOCAL_IMAGE:-raulbellosom/atlaserp:api-local-latest}
    container_name: atlas-api-local
    profiles: ["local"]
    env_file:
      - ./.env.local
    environment:
      ATLAS_PROJECT_ROOT: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4010:4010"
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-worker-local:
    image: ${ATLAS_WORKER_LOCAL_IMAGE:-raulbellosom/atlaserp:worker-local-latest}
    container_name: atlas-worker-local
    profiles: ["local"]
    env_file:
      - ./.env.local
    environment:
      ATLAS_PROJECT_ROOT: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-web-local:
    image: ${ATLAS_WEB_LOCAL_IMAGE:-raulbellosom/atlaserp:web-local-latest}
    container_name: atlas-web-local
    profiles: ["local"]
    ports:
      - "5173:80"
    restart: unless-stopped
