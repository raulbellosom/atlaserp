name: atlaserp

services:
  atlas-api-external:
    image: ${ATLAS_API_IMAGE:-raulbellosom/atlaserp:api-latest}
    container_name: atlas-api-external
    profiles: ["external"]
    env_file:
      - ./.env.external
    environment:
      ATLAS_PROJECT_ROOT: /app
    ports:
      - "4010:4010"
    volumes:
      - ./custom-modules:/app/modules/custom
    networks:
      default:
        aliases:
          - api
    restart: unless-stopped

  atlas-worker-external:
    image: ${ATLAS_WORKER_IMAGE:-raulbellosom/atlaserp:worker-latest}
    container_name: atlas-worker-external
    profiles: ["external"]
    env_file:
      - ./.env.external
    environment:
      ATLAS_PROJECT_ROOT: /app
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-web-external:
    image: ${ATLAS_WEB_EXTERNAL_IMAGE:-raulbellosom/atlaserp:web-latest}
    container_name: atlas-web-external
    profiles: ["external"]
    environment:
      ATLAS_API_URL: ${ATLAS_API_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "5173:80"
    depends_on:
      - atlas-api-external
    restart: unless-stopped

  atlas-api-local:
    image: ${ATLAS_API_LOCAL_IMAGE:-raulbellosom/atlaserp:api-latest}
    container_name: atlas-api-local
    profiles: ["local"]
    env_file:
      - ./.env.local
    environment:
      ATLAS_PROJECT_ROOT: /app
    ports:
      - "4010:4010"
    volumes:
      - ./custom-modules:/app/modules/custom
    networks:
      default:
        aliases:
          - api
    restart: unless-stopped

  atlas-worker-local:
    image: ${ATLAS_WORKER_LOCAL_IMAGE:-raulbellosom/atlaserp:worker-latest}
    container_name: atlas-worker-local
    profiles: ["local"]
    env_file:
      - ./.env.local
    environment:
      ATLAS_PROJECT_ROOT: /app
    volumes:
      - ./custom-modules:/app/modules/custom
    restart: unless-stopped

  atlas-web-local:
    image: ${ATLAS_WEB_LOCAL_IMAGE:-raulbellosom/atlaserp:web-latest}
    container_name: atlas-web-local
    profiles: ["local"]
    environment:
      ATLAS_API_URL: http://localhost:4010
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "5173:80"
    depends_on:
      - atlas-api-local
    restart: unless-stopped
