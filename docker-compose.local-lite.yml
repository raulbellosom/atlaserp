services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_erp
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    volumes:
      - atlas_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: atlas-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlas_minio
      MINIO_ROOT_PASSWORD: atlas_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atlas_minio_data:/data

  api:
    image: node:22-alpine
    container_name: atlas-api
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm prisma:generate && pnpm --filter @atlas/api dev"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas_erp?schema=public
      DIRECT_URL: postgresql://atlas:atlas@postgres:5432/atlas_erp?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "4010:4010"
    volumes:
      - .:/workspace
      - atlas_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    image: node:22-alpine
    container_name: atlas-web
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @atlas/desktop dev:web --host 0.0.0.0"
    env_file: .env
    environment:
      VITE_ATLAS_API_URL: http://localhost:4010
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - atlas_node_modules:/workspace/node_modules
    depends_on:
      - api

  worker:
    image: node:22-alpine
    container_name: atlas-worker
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm prisma:generate && pnpm --filter @atlas/worker dev"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas_erp?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - .:/workspace
      - atlas_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  atlas_postgres_data:
  atlas_redis_data:
  atlas_minio_data:
  atlas_node_modules:
