name: UUID Policy

on:
  push:
  pull_request:

jobs:
  enforce-uuid-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: UUID Policy Check
        run: node scripts/enforce-uuid-policy.mjs
